http:
  middlewares:
    strip-api-prefix:
      stripPrefix:
        prefixes:
          - /api

    # RunPod HTTP probes often use GET /ping — backend serves a cheap JSON at GET /.
    ping-to-backend-root:
      replacePath:
        path: /

  routers:
    to-ping:
      rule: Path(`/ping`) || PathPrefix(`/ping/`)
      entryPoints: [web]
      middlewares: [ping-to-backend-root]
      service: backend-svc
      priority: 200

    to-backend:
      rule: PathPrefix(`/api`)
      entryPoints: [web]
      middlewares: [strip-api-prefix]
      service: backend-svc
      priority: 100

    to-frontend:
      rule: PathPrefix(`/`)
      entryPoints: [web]
      service: frontend-svc
      priority: 10

  services:
    backend-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8088"

    frontend-svc:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:3000"
